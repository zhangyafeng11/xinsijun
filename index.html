        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = timelineData.map((item, index) => `
                <div class="timeline-item" data-index="${index}">
                    <div class="timeline-year">${item.year}</div>
                    <div class="timeline-title">${item.title}</div>
                </div>
            `).join('');

            document.querySelectorAll('.timeline-item').forEach(item => {
                item.addEventListener('click', () => selectEvent(parseInt(item.dataset.index)));
            });
        }

        function createCarousel(images) {
            if (!images || images.length === 0) return '';
            
            return `
                <div class="carousel-wrapper" onmouseenter="stopCarousel(this)" onmouseleave="startCarousel(this)">
                    <button class="carousel-prev" onclick="prevSlide(this.parentElement)">‹</button>
                    <div class="carousel-container">
                        ${images.map((img, index) => `
                            <div class="carousel-item">
                                <img src="${img}" alt="图片${index + 1}" ondblclick="openImageViewer('${img}')" style="cursor: zoom-in;" onerror="this.src='https://picsum.photos/1000/500?random=${index}'">
                            </div>
                        `).join('')}
                    </div>
                    <button class="carousel-next" onclick="nextSlide(this.parentElement)">›</button>
                    <div class="carousel-counter">1/${images.length}</div>
                    <div class="carousel-indicators">
                        ${images.map((_, index) => `
                            <button class="carousel-indicator ${index === 0 ? 'active' : ''}" onclick="goToSlide(this.parentElement.parentElement, ${index})"></button>
                        `).join('')}
                    </div>
                    <div class="carousel-hint">双击图片可放大查看</div>
                </div>
            `;
        }

        function openImageViewer(imageUrl) {
            const viewer = document.createElement('div');
            viewer.className = 'image-viewer';
            viewer.innerHTML = `
                <div class="image-viewer-overlay" onclick="closeImageViewer()"></div>
                <div class="image-viewer-content">
                    <button class="image-viewer-close" onclick="closeImageViewer()">×</button>
                    <img src="${imageUrl}" alt="大图查看">
                </div>
            `;
            document.body.appendChild(viewer);
            document.body.style.overflow = 'hidden';
        }

        function closeImageViewer() {
            const viewer = document.querySelector('.image-viewer');
            if (viewer) {
                viewer.remove();
                document.body.style.overflow = '';
            }
        }

        function createVideoSection(event) {
            if (!event.videoLarge && (!event.videoCards || event.videoCards.length === 0)) {
                return '';
            }
            
            let videoHtml = '<div class="video-section"><h3>视频资源</h3>';
            
            if (event.videoLarge) {
                videoHtml += `<div class="video-large">${event.videoLarge}</div>`;
            } else if (event.videoCards && event.videoCards.length >= 2) {
                videoHtml += `
                    <div class="video-large-card" onclick="window.open('${event.videoCards[0].url}', '_blank')">
                        <div class="video-large-icon">▶️</div>
                        <div class="video-large-info">
                            <div class="video-large-title">${event.videoCards[0].title}</div>
                            <div class="video-large-source">${event.videoCards[0].source}</div>
                        </div>
                    </div>
                `;
            }
            
            if (event.videoCards && event.videoCards.length > 0) {
                const startIndex = event.videoLarge ? 0 : 1;
                const cardsToShow = event.videoCards.slice(startIndex);
                
                if (cardsToShow.length > 0) {
                    videoHtml += '<div class="video-cards">';
                    cardsToShow.forEach((card, index) => {
                        videoHtml += `
                            <div class="video-card" onclick="window.open('${card.url}', '_blank')">
                                <div class="video-icon">▶️</div>
                                <div class="video-title">${card.title}</div>
                                <div class="video-source">${card.source}</div>
                            </div>
                        `;
                    });
                    videoHtml += '</div>';
                }
            }
            
            videoHtml += '</div>';
            return videoHtml;
        }

        function selectEvent(index) {
            const event = timelineData[index];

            document.querySelectorAll('.timeline-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            document.getElementById('welcomePanel').style.display = 'none';

            const detail = document.getElementById('eventDetail');
            detail.classList.add('active');
            
            const carouselHtml = createCarousel(event.images);
            const videoHtml = createVideoSection(event);
            
            const resourceHtml = event.resources ? event.resources.map(r => `
                <a href="${r.url}" target="_blank" class="resource-link">
                    🔗 ${r.name}
                </a>
            `).join('') : '';

            detail.innerHTML = `
                <div class="event-header">
                    <h2>${event.title}</h2>
                    <span class="year-tag">${event.year}年</span>
                    <p class="desc">${event.desc}</p>
                </div>

                ${carouselHtml}

                ${videoHtml}

                <div class="task-section">
                    <h3>学习任务</h3>
                    <p class="task-text">${event.task}</p>
                </div>

                <div class="resource-section">
                    <h3>学习资源</h3>
                    ${resourceHtml}
                </div>

                <div class="ai-section">
                    <h3>🔥 烽火问答</h3>
                    <div class="custom-question">
                        <h4>输入您的问题：</h4>
                        <div class="question-input-group">
                            <input type="text" class="question-input" id="customQuestion" placeholder="请输入您想了解的问题...">
                            <button class="ask-btn" onclick="askCustomQuestion()">提问</button>
                        </div>
                    </div>
                    <div class="preset-questions">
                        <span class="preset-label">或选择预设问题：</span>
                        <button class="preset-btn" onclick="askPresetQuestion('${event.presetQuestion.replace(/'/g, "\\'")}')">
                            ${event.presetQuestion}
                        </button>
                    </div>
                    <div class="ai-response" id="aiResponse"></div>
                </div>
            `;

            initCarousels();
        }

        function initCarousels() {
            document.querySelectorAll('.carousel-wrapper').forEach(wrapper => {
                wrapper.currentIndex = 0;
                startCarousel(wrapper);
            });
        }

        function startCarousel(wrapper) {
            stopCarousel(wrapper);
            if (wrapper.querySelectorAll('.carousel-item').length > 1) {
                wrapper.autoPlayTimer = setInterval(() => nextSlide(wrapper), 4000);
            }
        }

        function stopCarousel(wrapper) {
            if (wrapper.autoPlayTimer) {
                clearInterval(wrapper.autoPlayTimer);
                wrapper.autoPlayTimer = null;
            }
        }

        function nextSlide(wrapper) {
            const items = wrapper.querySelectorAll('.carousel-item');
            wrapper.currentIndex = (wrapper.currentIndex + 1) % items.length;
            updateCarousel(wrapper);
        }

        function prevSlide(wrapper) {
            const items = wrapper.querySelectorAll('.carousel-item');
            wrapper.currentIndex = (wrapper.currentIndex - 1 + items.length) % items.length;
            updateCarousel(wrapper);
        }

        function goToSlide(wrapper, index) {
            wrapper.currentIndex = index;
            updateCarousel(wrapper);
        }

        function updateCarousel(wrapper) {
            const container = wrapper.querySelector('.carousel-container');
            const counter = wrapper.querySelector('.carousel-counter');
            const indicators = wrapper.querySelectorAll('.carousel-indicator');
            
            container.style.transform = `translateX(-${wrapper.currentIndex * 100}%)`;
            counter.textContent = `${wrapper.currentIndex + 1}/${indicators.length}`;
            
            indicators.forEach((ind, i) => {
                ind.classList.toggle('active', i === wrapper.currentIndex);
            });
        }

        async function askPresetQuestion(question) {
            await callDeepSeekAPI(question);
        }

        async function askCustomQuestion() {
            const input = document.getElementById('customQuestion');
            const question = input.value.trim();
            if (!question) {
                alert('请输入问题');
                return;
            }
            await callDeepSeekAPI(question);
            input.value = '';
        }

        async function callDeepSeekAPI(question) {
            const responseEl = document.getElementById('aiResponse');
            const presetBtns = document.querySelectorAll('.preset-btn');
            const askBtn = document.querySelector('.ask-btn');

            responseEl.classList.remove('show');
            responseEl.innerHTML = '<span class="loading"></span>正在思考中...';
            responseEl.classList.add('show');

            presetBtns.forEach(btn => btn.disabled = true);
            askBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {
                                role: 'system',
                                content: '你是一位风趣幽默的新四军历史教育专家，说话带点俏皮但绝对尊重历史事实。讲解抗战历史时要生动有趣，偶尔可以开点小玩笑，但必须保证史实准确。就像给朋友讲故事一样轻松愉快！'
                            },
                            {
                                role: 'user',
                                content: question
                            }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }

                const data = await response.json();
                const answer = data.choices[0].message.content;

                responseEl.innerHTML = answer.replace(/\n/g, '<br>');

            } catch (error) {
                console.error('API Error:', error);
                responseEl.innerHTML = `
                    <div class="error-msg">
                        ⚠️ 获取回答失败：${error.message}<br>
                        请检查 API Key 是否正确配置，或确认网络连接正常。
                    </div>
                `;
            } finally {
                presetBtns.forEach(btn => btn.disabled = false);
                askBtn.disabled = false;
            }
        }

        renderTimeline();
    </script>
